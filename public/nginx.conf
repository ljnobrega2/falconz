## Senderzz Standalone — Nginx vhost config
## Include in your server block or use as reference.

server {
    listen 80;
    listen 443 ssl http2;
    server_name app.senderzz.com;

    root /var/www/senderzz/public;
    index index.php;

    ssl_certificate     /etc/ssl/senderzz/fullchain.pem;
    ssl_certificate_key /etc/ssl/senderzz/privkey.pem;

    # Static assets — serve directly
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|woff2?|ttf|ico|webp)$ {
        root /var/www/senderzz;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP via index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_WP_NONCE $http_x_wp_nonce;
        fastcgi_read_timeout 120;
    }

    # Block direct access to bootstrap/
    location /bootstrap/ { deny all; return 403; }
    location /includes/  { deny all; return 403; }
    location /src/        { deny all; return 403; }
    location /tests/      { deny all; return 403; }
    location ~ /\.        { deny all; return 403; }

    client_max_body_size 64M;
}
