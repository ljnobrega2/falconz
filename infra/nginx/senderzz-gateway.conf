# =============================================================================
# Senderzz — Nginx Gateway (Strangler Fig — Fases 1–6)
#
# Ordem de migração (ativar progressivamente comentando/descomentando blocos):
#   Fase 1: sz-motoboy     → motoboy_go  :8080
#   Fase 2: tp-carteira    → wallet_go   :8081
#   Fase 3: affiliates     → affiliates_go :8083
#   Fase 4: wc-melhor-envio → labels_go  :8084
#   Fase 5: portal         → portal_go   :8085
#   Fase 6: orders         → orders_go   :8086
#   Fase 7: tudo → Go, desligar WP
#
# Instalar em: /etc/nginx/conf.d/senderzz-gateway.conf
# Testar:  nginx -t
# Reload:  nginx -s reload
# =============================================================================

# ── Upstreams ─────────────────────────────────────────────────────────────────

upstream wordpress {
    server 127.0.0.1:80;
    keepalive 32;
}

# Fase 1: Motoboy (sz-motoboy/v1)
upstream motoboy_go {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Fase 2: Wallet + PIX (tp-carteira/v1)
upstream wallet_go {
    server 127.0.0.1:8081;
    keepalive 32;
}

# Fase 3: Affiliates + COD (senderzz/v1 affiliates + cod)
upstream affiliates_go {
    server 127.0.0.1:8083;
    keepalive 32;
}

# Fase 4: Labels + Melhor Envio (wc-melhor-envio/v1)
upstream labels_go {
    server 127.0.0.1:8084;
    keepalive 32;
}

# Fase 5: Portal (senderzz/v1 portal auth + webhooks + settings)
upstream portal_go {
    server 127.0.0.1:8085;
    keepalive 32;
}

# Fase 6: Orders (senderzz/v1 orders + payments)
upstream orders_go {
    server 127.0.0.1:8086;
    keepalive 32;
}

# Admin service (senderzz/v1/admin)
upstream admin_go {
    server 127.0.0.1:8087;
    keepalive 16;
}

# Admin UI (React SPA)
upstream admin_ui {
    server 127.0.0.1:8089;
    keepalive 8;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name app.senderzz.com.br;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal ───────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.senderzz.com.br;

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/app.senderzz.com.br/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/app.senderzz.com.br/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/app.senderzz.com.br/chain.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:10m;
    ssl_stapling         on;
    ssl_stapling_verify  on;

    # ── Cabeçalhos de segurança ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self'" always;
    add_header Permissions-Policy        "geolocation=(self), camera=(self)"            always;

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/senderzz-access.log;
    error_log  /var/log/nginx/senderzz-error.log warn;

    # ── Health checks dos Go services ─────────────────────────────────────────
    location = /health/motoboy    { proxy_pass http://motoboy_go/health;    access_log off; }
    location = /health/wallet     { proxy_pass http://wallet_go/health;     access_log off; }
    location = /health/affiliates { proxy_pass http://affiliates_go/health; access_log off; }
    location = /health/labels     { proxy_pass http://labels_go/health;     access_log off; }
    location = /health/portal     { proxy_pass http://portal_go/health;     access_log off; }
    location = /health/orders     { proxy_pass http://orders_go/health;     access_log off; }
    location = /health/admin      { proxy_pass http://admin_go/healthz;     access_log off; }

    # ── PROXY MACRO ───────────────────────────────────────────────────────────
    # Usado nos location blocks abaixo via include (nginx ≥1.25 suporta variáveis
    # em proxy_pass; para versões antigas, duplicar o bloco).

    # ── Admin UI (React SPA) ──────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://admin_ui/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Admin API (Go service) ────────────────────────────────────────────────
    location /wp-json/senderzz/v1/admin/ {
        proxy_pass         http://admin_go;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # ── Fase 1: Motoboy ───────────────────────────────────────────────────────
    location /wp-json/sz-motoboy/v1/ {
        proxy_pass         http://motoboy_go;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_buffering    off;
        proxy_pass_header  Set-Cookie;
    }

    # ── Fase 2: Wallet + PIX ──────────────────────────────────────────────────
    # Ativar após 30 dias de double-write estável.
    # Para ativar: remover o comentário abaixo.
    #
    # ATENÇÃO: endpoint /tp-carteira/v1/pix/webhook é crítico (financeiro).
    # Só ativar quando reconcile diário mostrar 0 divergências por 14 dias.
    #
    location /wp-json/tp-carteira/v1/ {
        # FASE 2 INATIVA — descomentar após cutover confirmado:
        # proxy_pass         http://wallet_go;
        # proxy_http_version 1.1;
        # proxy_set_header   Host              $host;
        # proxy_set_header   X-Real-IP         $remote_addr;
        # proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # proxy_set_header   X-Forwarded-Proto $scheme;
        # proxy_set_header   Connection        "";
        # proxy_connect_timeout 5s;
        # proxy_read_timeout    30s;

        # Enquanto inativo, todo tráfego vai pro WP:
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Fase 3: Affiliates + COD ──────────────────────────────────────────────
    # Ativar após Fase 2 estável.
    location ~ ^/wp-json/senderzz/v1/(affiliates|cod)/ {
        # FASE 3 INATIVA:
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Ativar: trocar proxy_pass acima por http://affiliates_go
    }

    # ── Fase 4: Labels + Melhor Envio ─────────────────────────────────────────
    location /wp-json/wc-melhor-envio/v1/ {
        # FASE 4 INATIVA:
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    120s;
        # Ativar: trocar proxy_pass por http://labels_go; read_timeout 60s
    }

    # ── Fase 5: Portal ────────────────────────────────────────────────────────
    # senderzz/v1/portal/* → portal-service
    location ~ ^/wp-json/senderzz/v1/portal/ {
        # FASE 5 INATIVA:
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Ativar: trocar proxy_pass por http://portal_go
    }

    # ── Fase 6: Orders ────────────────────────────────────────────────────────
    location ~ ^/wp-json/senderzz/v1/orders/ {
        # FASE 6 INATIVA:
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        # Ativar: trocar proxy_pass por http://orders_go
    }

    # ── senderzz/v1 restante (não mapeado ainda) → WordPress ─────────────────
    location /wp-json/senderzz/v1/ {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    60s;
    }

    # ── WordPress — fallback ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 32k;
    }

    # ── Arquivos estáticos ────────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root    /var/www/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri @wordpress;
    }

    location @wordpress {
        proxy_pass http://wordpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Certbot ACME ─────────────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
